    <script>
      window.addEventListener("load", function(event) {

        const feedUrl = 'https://www.yagwud.com/cms/wp-admin/admin-ajax.php';

        $.ajax({
          type: "POST",
          url: feedUrl,
          data:{'action': 'events_list','bid':'henrystrongbox'},
          async:true,
          dataType : 'json',   //you may use jsonp for cross origin request
          crossDomain:true,
          success: function(data, status, xhr) {
            if( !data.shows ){
              $('#event-missing').show();
            }else{
              $.each(data.shows, function(i, item) {
                $('#event-list').append( $('<dt>').text( item.show_date ) );
                if( item.event_link ){
                  $('#event-list').append( $('<dd>').append( $('<a>').attr('target','_blank').attr('href',item.event_link).text( item.title ) ) );
                }else{
                  $('#event-list').append( $('<dd>').text( item.title ) );
                }
              });
            }
          }
        });
      });
    </script>

    <!-- Piwik -->
    <script type="text/javascript">

      _paq.push(["setDomains", ["*.www.henrystrongbox.com"]]);

      (function() {
        var u="//piwik.sofasurfer.org/";

        g.type='text/javascript'; g.async=true; g.defer=true; g.src=u+'piwik.js'; s.parentNode.insertBefore(g,s);
